name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: |
            coverage.xml
            .coverage

  coverage-check:
    name: Code Coverage
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-data

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Check coverage threshold
        run: uv run coverage report --fail-under=70

      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: coverage.xml

  integration-tests:
    name: Integration Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to staging
        run: doctl apps create-deployment ${{ secrets.DO_STAGING_APP_ID }} --wait

      - name: Wait for staging health
        run: |
          echo "Waiting for staging to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pe-hackathon-staging-f28oj.ondigitalocean.app/health)
            if [ "$STATUS" = "200" ]; then
              echo "Staging healthy!"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Staging unhealthy after 5 minutes"
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run integration tests against staging
        run: |
          uv run pytest tests/test_health.py -v
        env:
          BASE_URL: https://pe-hackathon-staging-f28oj.ondigitalocean.app

  deploy-prod:
    needs: [unit-tests, coverage-check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy prod-nyc
        run: doctl apps create-deployment ${{ secrets.DO_PROD_NYC_APP_ID }} --wait

      - name: Deploy prod-sfo
        run: doctl apps create-deployment ${{ secrets.DO_PROD_SFO_APP_ID }} --wait

      - name: Verify prod-nyc health
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pe-hackathon-muy5v.ondigitalocean.app/health)
            if [ "$STATUS" = "200" ]; then echo "prod-nyc healthy"; exit 0; fi
            sleep 10
          done
          exit 1

      - name: Verify prod-sfo health
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pe-hackathon-prod-sfo-wkpqr.ondigitalocean.app/health)
            if [ "$STATUS" = "200" ]; then echo "prod-sfo healthy"; exit 0; fi
            sleep 10
          done
          exit 1
